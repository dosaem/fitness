spring:
  application:
    name: fitness-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  mail:
    host: ${MAIL_HOST:smtppro.zoho.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

# JWT 설정
jwt:
  secret: ${JWT_SECRET:fitness-dev-secret-key-minimum-256-bits-required-here}
  access-token-validity: 3600000      # 1시간
  refresh-token-validity: 604800000   # 7일

# App 설정
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  mail:
    from: ${MAIL_FROM:noreply@dosaem.com}

---
# ============================================
# LOCAL - 로컬 개발 환경 (H2 In-Memory DB)
# ============================================
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:h2:mem:fitness_local;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

---
# ============================================
# DEV - 개발 환경 (PostgreSQL)
# ============================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fitness_dev}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:fitness}
    password: ${DB_PASSWORD:fitness123}

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

---
# ============================================
# PROD - 운영 환경 (PostgreSQL)
# ============================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:fitness}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:fitness}
    password: ${DB_PASSWORD}

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
