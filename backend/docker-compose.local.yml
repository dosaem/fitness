version: '3.8'

# ============================================
# LOCAL 환경 - 로컬 개발용 (PostgreSQL)
# ============================================

services:
  db:
    image: postgres:15-alpine
    container_name: fitness-db-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: fitness_local
      POSTGRES_USER: fitness
      POSTGRES_PASSWORD: fitness123
    volumes:
      - fitness-db-local:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitness -d fitness_local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  fitness-db-local:
