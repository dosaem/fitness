version: '3.8'

# ============================================
# 프로덕션 환경 - Synology NAS
# ============================================

services:
  fitness-db:
    image: postgres:15-alpine
    container_name: fitness-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fitness
      POSTGRES_USER: fitness
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /volume1/docker/fitness/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitness -d fitness"]
      interval: 10s
      timeout: 5s
      retries: 5

  fitness-backend:
    build: ./backend
    container_name: fitness-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: fitness-db
      DB_PORT: 5432
      DB_NAME: fitness
      DB_USERNAME: fitness
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      fitness-db:
        condition: service_healthy
    ports:
      - "8080:8080"

  fitness-frontend:
    build: ./frontend
    container_name: fitness-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://fitness-backend:8080
    depends_on:
      - fitness-backend
    ports:
      - "3000:3000"
