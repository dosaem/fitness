name: Deploy to Synology

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Build with Gradle
        run: |
          cd backend
          ./gradlew build -x test

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deployment webhook
        run: |
          response=$(curl -s -X POST \
            "${{ secrets.DEPLOY_WEBHOOK_URL }}?env=prod&branch=main&token=${{ secrets.DEPLOY_TOKEN }}")
          echo "Response: $response"

          if echo "$response" | grep -q "deploying"; then
            echo "Deployment triggered successfully!"
          else
            echo "Deployment trigger failed"
            exit 1
          fi

      - name: Wait for deployment
        run: sleep 90

      - name: Health check
        run: |
          url="https://fitness.dosaem.com/api/health"
          # Local port: 8087
          echo "Checking $url"

          for i in {1..5}; do
            response=$(curl -s "$url")
            echo "Attempt $i - Response: $response"

            if echo "$response" | grep -q "OK"; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 15
          done

          echo "Health check failed after 5 attempts"
          exit 1
